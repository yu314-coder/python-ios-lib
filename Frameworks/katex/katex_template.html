<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="katex.min.css">
<script src="katex.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000000; display: inline-block; }
  #math { display: inline-block; color: white; padding: 4px 8px; background: #000000; }
  .katex { font-size: 2em; }
  .katex .mord, .katex .mbin, .katex .mrel, .katex .mop, .katex .mpunct, .katex .mopen, .katex .mclose, .katex .minner { color: white; }
</style>
</head><body>
<div id="math"></div>
<script>
function renderMath(tex) {
  try {
    katex.render(tex, document.getElementById('math'), {
      displayMode: true,
      throwOnError: false,
      output: 'html',
      strict: false
    });
  } catch(e) {
    document.getElementById('math').textContent = tex;
  }
  var el = document.getElementById('math');
  var r = el.getBoundingClientRect();
  return JSON.stringify({x: Math.floor(r.x), y: Math.floor(r.y), w: Math.ceil(r.width), h: Math.ceil(r.height)});
}
</script>
</body></html>
