		FE439133A26945B5B2FB0E5B /* Install Python */ = {
			isa = PBXShellScriptBuildPhase;
			alwaysOutOfDate = 1;
			buildActionMask = 2147483647;
			files = (
			);
			inputPaths = (
				"$(PROJECT_DIR)/Frameworks/Python.xcframework/build/utils.sh",
				"$(PROJECT_DIR)/Frameworks/Python.xcframework/build/iOS-dylib-Info-template.plist",
				"$(PROJECT_DIR)/Frameworks/Python.xcframework/lib",
				"$(PROJECT_DIR)/app_packages",
			);
			name = "Install Python";
			outputPaths = (
				"$(TARGET_BUILD_DIR)/$(WRAPPER_NAME)/Frameworks",
				"$(TARGET_BUILD_DIR)/$(WRAPPER_NAME)/python",
			);
			runOnlyForDeploymentPostprocessing = 0;
			shellPath = /bin/sh;
			shellScript = "set -e\nif [ \"$EFFECTIVE_PLATFORM_NAME\" = \"-iphonesimulator\" ]; then\n  HOST_ARCH=$(uname -m)\n  if [ \"$HOST_ARCH\" = \"x86_64\" ]; then\n    export ARCHS=\"x86_64\"\n  else\n    export ARCHS=\"arm64\"\n  fi\nfi\nsource \"$PROJECT_DIR/Frameworks/Python.xcframework/build/utils.sh\"\ninstall_python Frameworks/Python.xcframework app_packages\n\n# Bundle ffmpeg dylibs for PyAV\nFFMPEG_SRC=\"$PROJECT_DIR/Frameworks/ffmpeg\"\nFFMPEG_DST=\"$TARGET_BUILD_DIR/$WRAPPER_NAME/Frameworks\"\nif [ -d \"$FFMPEG_SRC\" ]; then\n  echo \"Bundling ffmpeg dylibs...\"\n  for dylib in \"$FFMPEG_SRC\"/*.dylib; do\n    [ -L \"$dylib\" ] && continue\n    name=$(basename \"$dylib\")\n    short=$(echo \"$name\" | sed 's/\\([0-9]*\\)\\.[0-9]*\\.[0-9]*\\.dylib/\\1.dylib/')\n    cp \"$dylib\" \"$FFMPEG_DST/$short\" 2>/dev/null || true\n    if [ -f \"$FFMPEG_DST/$short\" ]; then\n      install_name_tool -id \"@rpath/$short\" \"$FFMPEG_DST/$short\" 2>/dev/null || true\n      for dep in $(otool -L \"$FFMPEG_DST/$short\" 2>/dev/null | grep '/tmp/ffmpeg-ios' | awk '{print $1}'); do\n        dep_short=$(basename \"$dep\" | sed 's/\\([0-9]*\\)\\.[0-9]*\\.[0-9]*\\.dylib/\\1.dylib/')\n        install_name_tool -change \"$dep\" \"@rpath/$dep_short\" \"$FFMPEG_DST/$short\" 2>/dev/null || true\n      done\n      codesign --force --sign \"$EXPANDED_CODE_SIGN_IDENTITY\" \"$FFMPEG_DST/$short\" 2>/dev/null || true\n      echo \"  Bundled: $short\"\n    fi\n  done\nfi\n\n# Bundle LaTeX frameworks (pdftex, kpathsea, ios_system)\nLATEX_SRC=\"$PROJECT_DIR/Frameworks/latex\"\nLATEX_DST=\"$TARGET_BUILD_DIR/$WRAPPER_NAME/Frameworks\"\nif [ -d \"$LATEX_SRC\" ]; then\n  echo \"Bundling LaTeX frameworks...\"\n  for xcfw in pdftex kpathsea ios_system; do\n    FW_DIR=\"$LATEX_SRC/$xcfw.xcframework\"\n    if [ -d \"$FW_DIR/ios-arm64/$xcfw.framework\" ]; then\n      SRC_FW=\"$FW_DIR/ios-arm64/$xcfw.framework\"\n    elif [ -d \"$FW_DIR/ios-arm64_armv7/$xcfw.framework\" ]; then\n      SRC_FW=\"$FW_DIR/ios-arm64_armv7/$xcfw.framework\"\n    else\n      continue\n    fi\n    rm -rf \"$LATEX_DST/$xcfw.framework\"\n    cp -R \"$SRC_FW\" \"$LATEX_DST/$xcfw.framework\"\n    codesign --force --sign \"$EXPANDED_CODE_SIGN_IDENTITY\" \"$LATEX_DST/$xcfw.framework\" 2>/dev/null || true\n    echo \"  Bundled: $xcfw.framework\"\n  done\n  # Copy texmf support files\n  TEXMF_DST=\"$TARGET_BUILD_DIR/$WRAPPER_NAME/Frameworks/latex/texmf\"\n  if [ -d \"$LATEX_SRC/texmf\" ]; then\n    mkdir -p \"$TEXMF_DST\"\n    cp -R \"$LATEX_SRC/texmf/\" \"$TEXMF_DST/\"\n    echo \"  Bundled: texmf ($(find $TEXMF_DST -type f | wc -l | tr -d ' ') files)\"\n  fi\nfi\n";
		};
/* End PBXShellScriptBuildPhase section */

