# Meson cross-compile file for aarch64-apple-ios (iPhoneOS, Apple Silicon).
# Used by numpy_ios/build_numpy_ios.sh.

[binaries]
c = ['clang', '-arch', 'arm64', '-isysroot', '/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS26.2.sdk', '-miphoneos-version-min=13.0']
cpp = ['clang++', '-arch', 'arm64', '-isysroot', '/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS26.2.sdk', '-miphoneos-version-min=13.0']
ar = '/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/ar'
strip = '/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/strip'
# Cython available via pip on the host; runs as regular python
cython = ['python3', '-c', 'from Cython.Compiler.Main import setuptools_main; import sys; sys.argv[0]="cython"; setuptools_main()']
# Python: we point to the HOST python3 (runs the build scripts) but tell numpy
# the iOS Python headers via include_dirs below.
python = 'python3'

[built-in options]
c_link_args = ['-arch', 'arm64', '-isysroot', '/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS26.2.sdk', '-miphoneos-version-min=13.0', '-undefined', 'dynamic_lookup']
cpp_link_args = ['-arch', 'arm64', '-isysroot', '/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS26.2.sdk', '-miphoneos-version-min=13.0', '-undefined', 'dynamic_lookup']

[properties]
# Tell meson this is a cross-build (not host)
needs_exe_wrapper = true
# Numpy-specific hooks
numpy_use_lapack_ilp64 = 'false'
# Accept `arm64` as CPU family detection
cpu_family = 'aarch64'
cpu = 'aarch64'
endian = 'little'
system = 'darwin'
# Apple arm64: `long double` is the same 64-bit IEEE-754 double as `double`.
longdouble_format = 'IEEE_DOUBLE_LE'

[host_machine]
system = 'darwin'
cpu_family = 'aarch64'
cpu = 'aarch64'
endian = 'little'
subsystem = 'ios'
