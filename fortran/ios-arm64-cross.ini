[binaries]
c = ['clang', '-target', 'arm64-apple-ios17.0', '-isysroot', '/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS26.2.sdk']
cpp = ['clang++', '-target', 'arm64-apple-ios17.0', '-isysroot', '/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS26.2.sdk']
fortran = ['/tmp/ios-flang-wrapper.py']
ar = 'ar'
strip = 'strip'

[host_machine]
system = 'darwin'
cpu_family = 'aarch64'
cpu = 'arm64'
endian = 'little'

[properties]
skip_sanity_check = true
needs_exe_wrapper = true
